services:
  postgres:
    image: postgres:16-alpine
    container_name: tradeflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradeflow
      POSTGRES_PASSWORD: tradeflow
      POSTGRES_DB: tradeflow
    ports:
      - "5432:5432"
    volumes:
      - tradeflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeflow -d tradeflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tradeflow_pgdata:
